# FreeRADIUS NAS clients
# MikroTik routers registered here (or loaded from DB)

# Default client — accepts any router for development
# In production, operators register their router IP + secret via dashboard
client default {
    ipaddr          = 0.0.0.0/0
    secret          = CHANGE_ME_SET_IN_ETC_FREERADIUS
    shortname       = default
    nastype         = other
}

# localhost (for testing)
client localhost {
    ipaddr          = 127.0.0.1
    secret          = CHANGE_ME_SET_IN_ETC_FREERADIUS
    shortname       = localhost
    nastype         = other
}
