# myFiBase RADIUS clients
# Router (NAS) clients are NOT defined here — they live in the "nas" table in
# PostgreSQL (sql module read_clients=yes), managed by the dashboard's router
# onboarding flow + scripts/radius-sync.sh. Only localhost testing lives here.
client localhost {
    ipaddr          = 127.0.0.1
    secret          = CHANGE_ME_SET_IN_ETC_FREERADIUS
    shortname       = localhost
    nastype         = other
}
