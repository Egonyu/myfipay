name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -count=1

  # Money-path integration test (P0-E): pay → webhook → session against
  # ephemeral Postgres + Redis service containers.
  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: itest
          POSTGRES_USER: itest
          POSTGRES_PASSWORD: itest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itest -d itest"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum
      - name: Integration test
        run: go test -tags integration ./integration/ -count=1 -v
        env:
          TEST_DATABASE_URL: postgres://itest:itest@localhost:5432/itest?sslmode=disable
          TEST_REDIS_URL: redis://localhost:6379/0

  # Build the API image in CI and push to GHCR so the 1GB droplet never
  # compiles Go itself — deploy.sh pulls ghcr.io/egonyu/myfipay/api:<sha>.
  image:
    needs: [test, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ghcr.io/egonyu/myfipay/api:${{ github.sha }}
            ghcr.io/egonyu/myfipay/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
