<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — myFiPay</title>
<link rel="stylesheet" href="/assets/style.css?v=2">
<link rel="stylesheet" href="/assets/dashboard.css?v=3">
</head>
<body class="dash-body">

<div class="dash-layout" id="dash-layout" style="display:none">
  <aside class="dash-sidebar" id="sidebar">
    <a class="logo" href="/">
      <span class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="19.5" r="1" fill="#fff" stroke="none"/></svg></span>
      <span>my<span class="fi">FiPay</span></span>
    </a>
    <nav class="dash-nav" id="dash-nav"></nav>
    <div class="dash-sidebar-foot">
      <div class="dash-user" id="dash-user"></div>
      <a href="#" id="logout-link" title="Sign out" aria-label="Sign out"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a>
    </div>
  </aside>

  <div class="dash-main">
    <header class="dash-topbar">
      <button class="dash-menu-btn" id="menu-btn" aria-label="Menu">☰</button>
      <h1 id="page-title"></h1>
      <div class="dash-topbar-actions" id="page-actions"></div>
    </header>
    <main class="dash-content" id="content"></main>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 id="modal-title"></h2>
      <button class="modal-close" id="modal-close" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="print-area"></div>

<script src="/assets/dashboard.js?v=4"></script>
</body>
</html>
