# json-file logs are unbounded by default — cap them so a chatty container
# can't fill the disk (P0-D)
x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  postgres:
    image: postgres:16-alpine
    container_name: myfibase_postgres
    restart: unless-stopped
    <<: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: myfibase_redis
    restart: unless-stopped
    <<: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # Normal deploys pull this CI-built image (deploy.sh sets API_IMAGE_TAG to
    # the git sha); `build:` remains only for the emergency --build fallback.
    image: ghcr.io/egonyu/myfipay/api:${API_IMAGE_TAG:-latest}
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: myfibase_api
    restart: unless-stopped
    <<: *default-logging
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # nginx and freeradius are installed natively (apt) on the host
  # to avoid Docker image availability issues and simplify port binding

  # adminer removed 2026-07-19 (P1 security): DB admin on a prod payments box
  # is standing exposure. For ad-hoc inspection use:
  #   docker exec -it myfibase_postgres psql -U myfibase -d myfibase

volumes:
  postgres_data:
  redis_data:
